<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragmentos :: head(titulo='Login - CIESA')}" />
</head>
<body style="background:#f5f5f5;">

<!-- Navbar mínima -->
<nav class="navbar-ciesa" style="padding:12px 0;">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" style="color:white; font-weight:700; font-size:1.2rem; text-decoration:none;">
            <i class="fa fa-building"></i> CIESA
        </a>
        <a th:href="@{/}" style="color:#ccc; font-size:0.9rem; text-decoration:none;">
            ← Volver al sitio
        </a>
    </div>
</nav>

<div class="login-card">
    <div class="login-icon"><i class="fas fa-lock"></i></div>
    <h4 style="font-weight:700; margin-bottom:6px;">Inicio de sesión administrativo</h4>
    <p style="color:#888; font-size:0.9rem; margin-bottom:28px;">Acceso exclusivo para personal autorizado.</p>

    <!-- Error de credenciales -->
    <div th:if="${param.error}" class="alert alert-danger text-start">
        <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.
    </div>
    <!-- Logout exitoso -->
    <div th:if="${param.logout}" class="alert alert-info text-start">
        <i class="fas fa-info-circle"></i> Sesión cerrada correctamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3 text-start">
            <label class="form-label">Correo electrónico</label>
            <input type="text" name="username" class="form-control"
                   placeholder="admin@ciesa.cr" required autofocus>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Contraseña</label>
            <div class="position-relative">
                <input type="password" name="password" id="passInput" class="form-control"
                       placeholder="••••••••" required>
                <button type="button" onclick="togglePass()"
                        style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#888;">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-submit">Ingresar</button>
    </form>
</div>

<footer style="background:#333; color:#aaa; text-align:center; padding:20px;">
    &copy; 2026 CIESA – Corporación Integral Consultora y Constructora
</footer>

<script>
function togglePass() {
    const input = document.getElementById('passInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<th:block th:replace="~{fragmentos :: navscript}" />
</body>
</html>
