<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragmentos :: head(titulo='Usuarios - CIESA Admin')}" />
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fa fa-building" style="color:white;"></i><span>&nbsp;CIESA | Admin</span></div>
    <nav class="nav flex-column">
        <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-chart-bar"></i> Dashboard</a>
        <a class="nav-link" th:href="@{/admin/contactos}"><i class="fas fa-envelope"></i> Solicitudes contacto</a>
        <a class="nav-link" th:href="@{/admin/postulaciones}"><i class="fas fa-briefcase"></i> Postulaciones laborales</a>
        <a class="nav-link" th:href="@{/admin/reuniones}"><i class="fas fa-calendar-alt"></i> Reuniones</a>
        <a class="nav-link" th:href="@{/admin/proyectos}"><i class="fas fa-folder-open"></i> Proyectos</a>
        <a class="nav-link active" th:href="@{/admin/usuarios}"><i class="fas fa-users-cog"></i> Usuarios</a>
        <hr style="border-color:rgba(255,255,255,0.1); margin:12px 16px;">
        <a class="nav-link" th:href="@{/}"><i class="fas fa-globe"></i> Ver sitio</a>
        <a class="nav-link" th:href="@{/logout}" style="color:#f87171 !important;"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
    </nav>
</div>
<div class="admin-navbar">
    <h6 style="margin:0; font-weight:700;">Gestión de Usuarios</h6>
</div>
<div class="admin-content">

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle"></i> <span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- TABLA DE USUARIOS -->
        <div class="col-lg-8">
            <div class="bg-white rounded-3 shadow-sm p-4">
                <h5 style="font-weight:700; margin-bottom:20px;">Usuarios registrados</h5>
                <table class="table table-hover">
                    <thead style="background:#f5f5f5;">
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Roles</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${lista}">
                            <td th:text="${u.idUsuario}"></td>
                            <td><strong th:text="${u.username}"></strong></td>
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.correo}"></td>
                            <td>
                                <span th:each="rol : ${u.roles}"
                                      style="background:#e8f5f5; color:#2a9d8f; padding:2px 8px; border-radius:10px; font-size:0.8rem; margin-right:4px;"
                                      th:text="${rol.rol}"></span>
                            </td>
                            <td>
                                <span th:if="${u.activo}" style="color:#2a9d8f; font-weight:600;">Activo</span>
                                <span th:if="${!u.activo}" style="color:#dc3545; font-weight:600;">Inactivo</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/usuarios/toggle/{id}(id=${u.idUsuario})}"
                                   th:class="${u.activo} ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'"
                                   th:title="${u.activo} ? 'Desactivar usuario' : 'Activar usuario'">
                                    <i th:class="${u.activo} ? 'fas fa-user-slash' : 'fas fa-user-check'"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(lista)}">
                            <td colspan="7" style="text-align:center; color:#888; padding:30px;">No hay usuarios registrados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- FORMULARIO NUEVO USUARIO -->
        <div class="col-lg-4">
            <div class="bg-white rounded-3 shadow-sm p-4">
                <h5 style="font-weight:700; margin-bottom:20px;">Nuevo usuario</h5>
                <form th:action="@{/admin/usuarios/guardar}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username *</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="usuario123" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña *</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre completo *</label>
                        <input type="text" name="nombre" class="form-control"
                               placeholder="Nombre del usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" name="correo" class="form-control"
                               placeholder="correo@ciesa.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Rol *</label>
                        <select name="idRol" class="form-select" required>
                            <option value="">Seleccione un rol</option>
                            <option th:each="rol : ${roles}"
                                    th:value="${rol.idRol}"
                                    th:text="${rol.rol}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus me-2"></i> Crear usuario
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
