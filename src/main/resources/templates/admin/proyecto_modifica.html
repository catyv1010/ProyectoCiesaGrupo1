<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragmentos :: head(titulo='Editar Proyecto - CIESA Admin')}" />
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fa fa-building" style="color:white;"></i><span>&nbsp;CIESA | Admin</span></div>
    <nav class="nav flex-column">
        <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-chart-bar"></i> Dashboard</a>
        <a class="nav-link" th:href="@{/admin/contactos}"><i class="fas fa-envelope"></i> Solicitudes contacto</a>
        <a class="nav-link" th:href="@{/admin/postulaciones}"><i class="fas fa-briefcase"></i> Postulaciones laborales</a>
        <a class="nav-link" th:href="@{/admin/reuniones}"><i class="fas fa-calendar-alt"></i> Reuniones</a>
        <a class="nav-link active" th:href="@{/admin/proyectos}"><i class="fas fa-folder-open"></i> Proyectos</a>
        <a class="nav-link" th:href="@{/admin/usuarios}"><i class="fas fa-users-cog"></i> Usuarios</a>
        <hr style="border-color:rgba(255,255,255,0.1); margin:12px 16px;">
        <a class="nav-link" th:href="@{/}"><i class="fas fa-globe"></i> Ver sitio</a>
        <a class="nav-link" th:href="@{/logout}" style="color:#f87171 !important;"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
    </nav>
</div>
<div class="admin-navbar">
    <h6 style="margin:0; font-weight:700;">Editar Proyecto</h6>
    <a th:href="@{/admin/proyectos}" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left"></i> Volver al listado
    </a>
</div>
<div class="admin-content">
    <div class="bg-white rounded-3 shadow-sm p-4" style="max-width:800px;">
        <form th:action="@{/admin/proyectos/guardar}" th:object="${proyecto}" method="post" enctype="multipart/form-data">

            <!-- Campos ocultos para mantener el ID y la fecha -->
            <input type="hidden" th:field="*{idProyecto}">
            <input type="hidden" th:field="*{fechaCreacion}">

            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Título</label>
                    <input type="text" th:field="*{titulo}" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option value="Electromecánica">Electromecánica</option>
                        <option value="Infraestructura">Infraestructura</option>
                        <option value="Remodelación">Remodelación</option>
                        <option value="Construcción">Construcción</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="4" required></textarea>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Cambiar imagen (opcional)</label>
                    <input type="file" name="archivoImagen" class="form-control" accept="image/*">
                    <small class="text-muted">Dejalo vacío para mantener la imagen actual. Formatos: JPG, PNG, WEBP (max 5MB)</small>
                    <input type="hidden" th:field="*{rutaImagen}">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" th:field="*{activo}" class="form-check-input">
                        <label class="form-check-label">Proyecto activo</label>
                    </div>
                </div>

                <!-- Vista previa de imagen actual -->
                <div class="col-12" th:if="${proyecto.rutaImagen != null}">
                    <label class="form-label">Imagen actual</label><br>
                    <img th:src="${proyecto.rutaImagen}" alt="Vista previa"
                         style="max-height:200px; border-radius:8px; border:1px solid #ddd;"
                         onerror="this.style.display='none'">
                </div>

                <div class="col-12 mt-3">
                    <button type="submit" class="btn" style="background-color:#1FA37C; color:white;">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                    <a th:href="@{/admin/proyectos}" class="btn btn-secondary ms-2">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
