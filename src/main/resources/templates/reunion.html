<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendar Reunión – CIESA</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<div th:replace="~{fragmentos :: navbar}"></div>
<section style="padding:70px 0;">
    <div class="container">
        <div class="row g-5 align-items-start">
            <div class="col-lg-6">
                <div class="form-card">
                    <h3 style="font-weight:700; margin-bottom:8px;">Agendá tu reunión con CIESA</h3>
                    <p style="color:#555; margin-bottom:28px;">Coordiná una reunión con nuestro equipo técnico y recibí asesoría personalizada para tu proyecto.</p>
                    <form th:action="@{/reunion/confirmar}" method="post">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre completo *</label>
                                <input type="text" name="nombre" class="form-control" placeholder="Ingresá tu nombre" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Correo electrónico *</label>
                                <input type="email" name="correo" class="form-control" placeholder="tu@email.com" required>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Teléfono *</label>
                                <input type="tel" name="telefono" class="form-control" placeholder="+506 8888-8888" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tipo de servicio *</label>
                                <select name="servicio" class="form-select" required>
                                    <option value="">Seleccioná un servicio</option>
                                    <option>Servicios electromecánicos</option>
                                    <option>Construcción y remodelación</option>
                                    <option>Diseño y planos</option>
                                    <option>Tramitología y permisos</option>
                                    <option>Otro</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha deseada *</label>
                            <input type="date" name="fecha" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Comentarios opcionales</label>
                            <textarea name="comentarios" class="form-control" rows="4"
                                      placeholder="Contanos más detalles sobre tu proyecto o consulta..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-calendar-check me-2"></i> Confirmar reunión
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div style="background:var(--teal); color:white; border-radius:12px; padding:30px; margin-bottom:24px;">
                    <h5 style="font-weight:700; margin-bottom:16px;">¿Por qué elegir CIESA?</h5>
                    <ul style="list-style:none; padding:0;">
                        <li style="padding:6px 0;"><i class="fas fa-check-circle me-2"></i> Más de 14 años de experiencia</li>
                        <li style="padding:6px 0;"><i class="fas fa-check-circle me-2"></i> Equipo técnico especializado</li>
                        <li style="padding:6px 0;"><i class="fas fa-check-circle me-2"></i> Soluciones personalizadas</li>
                        <li style="padding:6px 0;"><i class="fas fa-check-circle me-2"></i> Cumplimiento normativo CFIA</li>
                    </ul>
                </div>
                <img th:src="@{/img/reunion.jpg}" alt="Reunión CIESA" class="img-fluid rounded"
                     onerror="this.src='https://placehold.co/500x300/2C2C2C/white?text=CIESA+Team'">
            </div>
        </div>
    </div>
</section>
<div th:replace="~{fragmentos :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
